<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dental AI Assistant</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 420px;
      background: white;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      overflow: hidden;
    }

    .header {
      background: #0ea5e9;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
    }

    .chat-box {
      padding: 15px;
      height: 300px;
      overflow-y: auto;
      border-bottom: 1px solid #eee;
    }

    .msg {
      margin: 10px 0;
      padding: 10px;
      border-radius: 10px;
      max-width: 80%;
    }

    .user {
      background: #dbeafe;
      margin-left: auto;
      text-align: right;
    }

    .bot {
      background: #f1f5f9;
      margin-right: auto;
    }

    .input-area {
      display: flex;
      padding: 10px;
    }

    input {
      flex: 1;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 10px;
      outline: none;
    }

    button {
      margin-left: 8px;
      padding: 10px 15px;
      background: #0ea5e9;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    button:hover {
      background: #0284c7;
    }

    .booking {
      text-align: center;
      padding: 15px;
    }

    .booking a {
      text-decoration: none;
      background: #22c55e;
      color: white;
      padding: 10px 15px;
      border-radius: 10px;
      display: inline-block;
      margin-top: 10px;
    }

  </style>
</head>

<body>

<div class="container">

  <div class="header">
    🦷 Dental AI Assistant
  </div>

  <div class="chat-box" id="chat"></div>

  <div class="input-area">
    <input id="msg" placeholder="Type your question...">
    <button onclick="send()">Send</button>
  </div>

  <div class="booking">
    📅 Book your appointment
    <br>
    <a href="YOUR_CALENDLY_LINK" target="_blank">Book Now</a>
  </div>

</div>

<script>
async function send() {

  let input = document.getElementById("msg");
  let text = input.value;

  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  let res = await fetch("/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message: text })
  });

  let data = await res.json();

  addMessage(data.reply, "bot");
}

function addMessage(text, type) {
  let chat = document.getElementById("chat");

  let div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
