<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dental AI Assistant</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #e0f2fe, #f8fafc);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 430px;
      background: white;
      border-radius: 18px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.12);
      overflow: hidden;
    }

    .header {
      background: #0ea5e9;
      color: white;
      padding: 18px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .sub {
      font-size: 12px;
      opacity: 0.9;
      margin-top: 4px;
    }

    .chat-box {
      padding: 15px;
      height: 320px;
      overflow-y: auto;
      border-bottom: 1px solid #eee;
    }

    .msg {
      margin: 10px 0;
      padding: 10px 12px;
      border-radius: 12px;
      max-width: 80%;
      font-size: 14px;
      line-height: 1.4;
    }

    .user {
      background: #dbeafe;
      margin-left: auto;
      text-align: right;
    }

    .bot {
      background: #f1f5f9;
      margin-right: auto;
    }

    .input-area {
      display: flex;
      padding: 12px;
      gap: 8px;
    }

    input {
      flex: 1;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 10px;
      outline: none;
      font-size: 14px;
    }

    button {
      padding: 10px 14px;
      background: #0ea5e9;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #0284c7;
    }

    .booking {
      text-align: center;
      padding: 15px;
      background: #f8fafc;
    }

    .booking a {
      text-decoration: none;
      background: #22c55e;
      color: white;
      padding: 10px 16px;
      border-radius: 10px;
      display: inline-block;
      margin-top: 8px;
      font-weight: bold;
    }

    .booking a:hover {
      background: #16a34a;
    }

  </style>
</head>

<body>

<div class="container">

  <div class="header">
    🦷 Dental AI Assistant
    <div class="sub">24/7 Smart Replies • Instant Booking</div>
  </div>

  <div class="chat-box" id="chat"></div>

  <div class="input-area">
    <input id="msg" placeholder="Ask your dental question...">
    <button onclick="send()">Send</button>
  </div>

  <div class="booking">
    📅 Book your appointment instantly
    <br>
    <a href="YOUR_CALENDLY_LINK" target="_blank">Book Now</a>
  </div>

</div>

<script>
async function send() {

  let input = document.getElementById("msg");
  let text = input.value;

  if (!text.trim()) return;

  addMessage(text, "user");
  input.value = "";

  try {
    let res = await fetch("/api/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message: text })
    });

    let data = await res.json();

    addMessage(data.reply, "bot");

  } catch (error) {
    addMessage("Error connecting to AI", "bot");
  }
}

function addMessage(text, type) {
  let chat = document.getElementById("chat");

  let div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
